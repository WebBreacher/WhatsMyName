<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WhatsMyName Checker</title>
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { font-family: monospace; font-size: 13px; margin: 0; background: #1a1a1a; color: #e0e0e0; }
  h1 { margin: 0; font-size: 18px; }
  a { color: #7ab3e0; }

  #topbar {
    position: sticky; top: 0; z-index: 100;
    background: #111; border-bottom: 1px solid #333;
    padding: 8px 12px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  #topbar button { cursor: pointer; padding: 4px 12px; font-size: 12px; font-family: monospace; }

  #progress-wrap { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 200px; }
  progress { width: 200px; height: 14px; accent-color: #4caf50; }
  #progress-text { font-size: 11px; color: #aaa; }

  #summary { padding: 6px 12px; font-size: 12px; color: #aaa; background: #1e1e1e; border-bottom: 1px solid #2a2a2a; }
  #summary span { margin-right: 14px; }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: #222; z-index: 50;
    padding: 5px 8px; text-align: left; border-bottom: 2px solid #444;
    white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid #2a2a2a; }
  tbody tr:hover { background: #252525; }
  td { padding: 4px 8px; vertical-align: top; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  td code { font-size: 11px; color: #ccc; }

  /* Status colors via class (column-position-independent) */
  tr.status-ok .col-status { color: #4caf50; }
  tr.status-site_down .col-status { color: #888; }
  tr.status-blocked .col-status { color: #ff9800; }
  tr.status-false_positive .col-status,
  tr.status-false_negative .col-status,
  tr.status-e_code_mismatch .col-status,
  tr.status-e_string_missing .col-status,
  tr.status-m_code_mismatch .col-status,
  tr.status-m_string_missing .col-status { color: #ef5350; }
  tr.status-skipped .col-status { color: #666; }

  /* Row background for non-ok */
  tr.status-false_positive { background: rgba(239,83,80,0.07) !important; }
  tr.status-false_negative { background: rgba(239,83,80,0.07) !important; }

  /* Buttons */
  .btn { cursor: pointer; padding: 2px 8px; font-size: 11px; font-family: monospace;
         background: #333; color: #ccc; border: 1px solid #555; }
  .btn:hover { background: #444; }
  .btn-save { background: #1b4e1b; color: #8bc34a; border-color: #4caf50; }
  .btn-save:hover { background: #2a6a2a; }
  .btn-recheck { background: #1b3a4e; color: #7ab3e0; border-color: #5599cc; }
  .btn-recheck:hover { background: #1e4a6a; }
  .btn-icon { width: 26px; height: 22px; padding: 0; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; }
  .btn-icon i { pointer-events: none; }

  /* Modal overlay */
  .modal-backdrop {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200;
    align-items: flex-start; justify-content: center; padding-top: 40px; overflow-y: auto;
  }
  .modal-backdrop.open { display: flex; }
  .modal-box {
    background: #1e1e1e; border: 1px solid #555; padding: 16px;
    max-width: 760px; width: 100%; max-height: 85vh; overflow-y: auto;
    margin: auto;
  }
  .modal-box h2 { margin: 0 0 10px; font-size: 15px; color: #fff; }
  .modal-box .check-detail {
    background: #151515; border: 1px solid #333; padding: 6px 8px; margin-bottom: 8px;
    font-size: 11px;
  }
  .modal-box .check-detail .snippet {
    color: #888; white-space: pre-wrap; word-break: break-all;
    max-height: 80px; overflow-y: auto; margin-top: 4px;
  }

  .form-row { margin-bottom: 8px; display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .form-row label { width: 90px; flex-shrink: 0; color: #aaa; font-size: 12px; }
  .form-row input[type=text], .form-row input[type=number], .form-row select, .form-row textarea {
    flex: 1; min-width: 200px; background: #2a2a2a; color: #e0e0e0;
    border: 1px solid #555; padding: 3px 6px; font-family: monospace; font-size: 12px;
  }
  .form-row textarea { resize: vertical; min-height: 60px; }

  .protection-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .protection-grid label { width: auto; display: flex; align-items: center; gap: 4px;
    background: #2a2a2a; border: 1px solid #444; padding: 2px 8px; font-size: 11px; }

  .modal-actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .save-msg { font-size: 11px; color: #4caf50; }
  .save-err { font-size: 11px; color: #ef5350; }

  .hidden { display: none !important; }

  /* ---- DataTables dark overrides ---- */
  div.dataTables_wrapper {
    color: #e0e0e0; font-family: monospace; font-size: 12px; padding: 8px 12px;
  }
  div.dataTables_wrapper div.dataTables_filter label,
  div.dataTables_wrapper div.dataTables_length label { color: #aaa; }
  div.dataTables_wrapper div.dataTables_filter input,
  div.dataTables_wrapper div.dataTables_length select {
    background: #2a2a2a; color: #e0e0e0; border: 1px solid #555;
    padding: 3px 6px; font-family: monospace; margin-left: 6px; outline: none;
  }
  div.dataTables_wrapper div.dataTables_info { color: #666; font-size: 11px; padding-top: 6px; }
  div.dataTables_wrapper div.dataTables_paginate .paginate_button {
    color: #aaa !important; border: 1px solid #444 !important;
    background: #2a2a2a !important; padding: 2px 8px; margin: 0 1px;
    cursor: pointer; font-size: 11px; font-family: monospace;
  }
  div.dataTables_wrapper div.dataTables_paginate .paginate_button:hover {
    background: #444 !important; color: #fff !important; border-color: #666 !important;
  }
  div.dataTables_wrapper div.dataTables_paginate .paginate_button.current,
  div.dataTables_wrapper div.dataTables_paginate .paginate_button.current:hover {
    background: #1b4e1b !important; color: #8bc34a !important; border-color: #4caf50 !important;
  }
  div.dataTables_wrapper div.dataTables_paginate .paginate_button.disabled,
  div.dataTables_wrapper div.dataTables_paginate .paginate_button.disabled:hover {
    color: #555 !important; background: #1a1a1a !important; border-color: #333 !important; cursor: default;
  }
  table.dataTable { border-collapse: collapse !important; width: 100% !important; }
  table.dataTable thead th {
    background: #222; border-bottom: 2px solid #444 !important;
    color: #e0e0e0; padding: 5px 8px; white-space: nowrap;
  }
  table.dataTable thead th.sorting:after,
  table.dataTable thead th.sorting_asc:after,
  table.dataTable thead th.sorting_desc:after { color: #888; }
  table.dataTable tbody tr.odd { background: #1a1a1a; }
  table.dataTable tbody tr.even { background: #1e1e1e; }
  table.dataTable tbody tr:hover td { background: #252525 !important; }
  table.dataTable tbody tr.status-false_positive td,
  table.dataTable tbody tr.status-false_negative td { background: rgba(239,83,80,0.07) !important; }
  table.dataTable tbody tr.status-false_positive:hover td,
  table.dataTable tbody tr.status-false_negative:hover td { background: rgba(239,83,80,0.12) !important; }
</style>
</head>
<body {% block body_attrs %}{% endblock %}>
{% block content %}{% endblock %}

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
<script>
// ---- DataTables init ----
$(document).ready(function() {
  if ($('#results-table').length) {
    $('#results-table').DataTable({
      pageLength: 25,
      lengthMenu: [[10, 25, 50, 100, -1], [10, 25, 50, 100, 'All']],
      order: [[0, 'asc']],
      columnDefs: [
        { orderable: false, targets: [-1, -2] },
        { searchable: false, targets: [-1, -2] }
      ],
      language: {
        search: 'Filter:',
        searchPlaceholder: 'Any keyword…',
        lengthMenu: 'Show _MENU_ per page',
        info: '_START_–_END_ of _TOTAL_ sites',
        infoFiltered: '(filtered from _MAX_)'
      }
    });
  }
});

// ---- Progress polling ----
let pollTimer = null;

function startPolling() {
  if (pollTimer) return;
  pollTimer = setInterval(async () => {
    const r = await fetch('/status');
    const data = await r.json();
    const bar = document.getElementById('progress-fill');
    const txt = document.getElementById('progress-text');
    if (bar && data.total > 0) { bar.value = data.done; bar.max = data.total; }
    if (txt) txt.textContent = data.done + ' / ' + data.total;
    if (data.complete) { clearInterval(pollTimer); pollTimer = null; window.location.reload(); }
  }, 2000);
}

document.addEventListener('DOMContentLoaded', () => {
  if (document.body.dataset.running === 'true') startPolling();
});

// ---- Body view modal ----
function openBodyModal(siteName) {
  const checks = (typeof WMN_CHECKS !== 'undefined' && WMN_CHECKS[siteName]) || [];
  const titleSpan = document.querySelector('#body-view-modal .body-modal-title');
  if (titleSpan) titleSpan.textContent = siteName;
  const content = document.getElementById('body-modal-content');
  if (!content) return;

  if (!checks.length) {
    content.innerHTML = '<div style="color:#666;padding:12px">No check data cached — run the checker first.</div>';
  } else {
    content.innerHTML = checks.map(c => {
      const color = c.status === 'ok' ? '#4caf50' : '#ef5350';
      const bodyHtml = c.body_snippet
        ? `<details style="margin-top:6px">
             <summary style="cursor:pointer;font-size:11px;color:#7ab3e0">Cached body (${c.body_snippet.length} chars)</summary>
             <pre style="max-height:400px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;
                         font-size:10px;background:#111;padding:8px;border:1px solid #333;margin:4px 0 0">${escHtml(c.body_snippet)}</pre>
           </details>`
        : '<div style="color:#666;font-size:11px;margin-top:4px">No body cached</div>';
      return `<div style="background:#151515;border:1px solid #333;padding:8px 10px;margin-bottom:10px">
        <div style="margin-bottom:4px">
          <strong style="color:#888;text-transform:uppercase;font-size:10px;letter-spacing:1px">${escHtml(c.username_type)}</strong>
          &nbsp;<code style="font-size:12px">${escHtml(c.username)}</code>
          &nbsp;&mdash;&nbsp;<span style="font-size:11px;color:#555;word-break:break-all">${escHtml(c.url)}</span>
        </div>
        <div style="font-size:12px">
          HTTP <strong>${c.http_code ?? 'none'}</strong>
          &nbsp;&mdash;&nbsp;<span style="color:${color}">${escHtml(c.status)}</span>
          &nbsp;&mdash;&nbsp;<span style="color:#999">${escHtml(c.note)}</span>
        </div>
        <div style="margin-top:6px">
          <button class="btn" style="font-size:10px;padding:1px 6px"
            onclick="fetchLiveBody(${JSON.stringify(siteName)},${JSON.stringify(c.username)},this)">Fetch live</button>
          <div class="full-body-panel" style="display:none;margin-top:4px">
            <div class="full-body-meta" style="font-size:10px;color:#888;margin-bottom:2px"></div>
            <pre class="full-body-pre" style="max-height:500px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;
                 font-size:10px;background:#111;padding:6px;border:1px solid #333"></pre>
          </div>
        </div>
        ${bodyHtml}
      </div>`;
    }).join('');
  }
  document.getElementById('body-view-modal').classList.add('open');
}

function closeBodyModal() {
  document.getElementById('body-view-modal').classList.remove('open');
}

async function fetchLiveBody(siteName, username, btnEl) {
  const panel = btnEl.parentElement.querySelector('.full-body-panel');
  if (panel.style.display !== 'none') { panel.style.display = 'none'; btnEl.textContent = 'Fetch live'; return; }
  btnEl.textContent = 'Fetching…'; btnEl.disabled = true;
  try {
    const resp = await fetch('/fetch/' + encodeURIComponent(siteName) + '/' + encodeURIComponent(username));
    const data = await resp.json();
    if (data.success) {
      panel.querySelector('.full-body-pre').textContent = data.body;
      panel.querySelector('.full-body-meta').textContent =
        'HTTP ' + data.http_code + '  •  ' + data.body.length + ' chars  •  ' + data.url;
      panel.style.display = '';
      btnEl.textContent = 'Hide live body';
    } else {
      alert('Fetch error: ' + data.error);
      btnEl.textContent = 'Fetch live';
    }
  } catch (e) {
    alert('Network error: ' + e.message);
    btnEl.textContent = 'Fetch live';
  }
  btnEl.disabled = false;
}

const ICON_RECHECK = '<i class="fa-solid fa-rotate-right"></i>';
const ICON_SPIN    = '<i class="fa-solid fa-spinner fa-spin"></i>';

// ---- Open URL in background tab ----
function openBg(url) {
  const w = window.open(url, '_blank', 'noopener,noreferrer');
  if (w) { w.blur(); }
  window.focus();
}

// ---- Edit modal ----
function openEdit(name) {
  const id = 'modal-' + name.replace(/[^a-z0-9]/gi, '_');
  const el = document.getElementById(id);
  if (el) el.classList.add('open');
}
function closeEdit(name) {
  const id = 'modal-' + name.replace(/[^a-z0-9]/gi, '_');
  const el = document.getElementById(id);
  if (el) el.classList.remove('open');
}
document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-backdrop')) e.target.classList.remove('open');
});

// ---- Save ----
async function saveEdit(event, siteName) {
  event.preventDefault();
  const form = event.target;
  const msgEl = form.querySelector('.save-msg');
  const errEl = form.querySelector('.save-err');
  if (msgEl) msgEl.textContent = 'Saving…';
  if (errEl) errEl.textContent = '';

  const data = new FormData(form);
  try {
    const resp = await fetch('/save/' + encodeURIComponent(siteName), { method: 'POST', body: data });
    const result = await resp.json();
    if (result.success) {
      if (msgEl) msgEl.textContent = 'Saved! Recheck to refresh table values.';
      const row = document.querySelector('tr[data-name="' + CSS.escape(siteName) + '"]');
      if (row) {
        const eStr = data.get('e_string');
        const mStr = data.get('m_string');
        if (eStr !== null) { const el = row.querySelector('.col-estring'); if (el) el.textContent = eStr.substring(0, 40); }
        if (mStr !== null) { const el = row.querySelector('.col-mstring'); if (el) el.textContent = mStr.substring(0, 40); }
        if (typeof $ !== 'undefined') $('#results-table').DataTable().row(row).invalidate().draw(false);
      }
    } else {
      if (errEl) errEl.textContent = 'Error: ' + result.error;
      if (msgEl) msgEl.textContent = '';
    }
  } catch (e) {
    if (errEl) errEl.textContent = 'Network error: ' + e.message;
    if (msgEl) msgEl.textContent = '';
  }
}

// ---- Fetch full body (edit modal) ----
async function fetchFullBody(siteName, username, btnEl) {
  const container = btnEl.closest('.check-detail').querySelector('.full-body-panel');
  if (container.style.display !== 'none') { container.style.display = 'none'; btnEl.textContent = 'Fetch full body'; return; }
  btnEl.textContent = 'Fetching…'; btnEl.disabled = true;
  try {
    const resp = await fetch('/fetch/' + encodeURIComponent(siteName) + '/' + encodeURIComponent(username));
    const data = await resp.json();
    if (data.success) {
      container.querySelector('.full-body-pre').textContent = data.body;
      container.querySelector('.full-body-meta').textContent =
        'HTTP ' + data.http_code + '  •  ' + data.body.length + ' chars  •  ' + data.url;
      container.style.display = '';
      btnEl.textContent = 'Hide body';
    } else {
      alert('Fetch error: ' + data.error);
      btnEl.textContent = 'Fetch full body';
    }
  } catch (e) {
    alert('Network error: ' + e.message);
    btnEl.textContent = 'Fetch full body';
  }
  btnEl.disabled = false;
}

// ---- Render checks (edit modal recheck) ----
function renderChecks(checks) {
  return checks.map(c => {
    const color = c.status === 'ok' ? '#4caf50' : '#ef5350';
    const bodyHtml = c.body_snippet
      ? `<details style="margin-top:4px">
           <summary style="cursor:pointer;font-size:11px;color:#7ab3e0">Response body (${c.body_snippet.length} chars)</summary>
           <pre class="snippet" style="max-height:300px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;font-size:10px;margin:4px 0 0">${escHtml(c.body_snippet)}</pre>
         </details>`
      : '';
    return `<div class="check-detail">
      <div><strong>${escHtml(c.username_type)}</strong> &ldquo;${escHtml(c.username)}&rdquo;
        &mdash; <code>${escHtml(c.url)}</code>
        &mdash; HTTP <strong>${c.http_code ?? 'none'}</strong>
        &mdash; <span style="color:${color}">${escHtml(c.status)}</span></div>
      <div style="color:#aaa;font-size:11px;margin:2px 0">${escHtml(c.note)}</div>
      ${bodyHtml}
    </div>`;
  }).join('');
}

function escHtml(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ---- Update table row after recheck ----
function updateRowAfterRecheck(siteName, result) {
  const row = document.querySelector('tr[data-name="' + CSS.escape(siteName) + '"]');
  if (!row) return;
  const s = result.overall_status;
  row.dataset.status = s;
  row.className = row.className.replace(/status-\S+/g, '') + ' data-row status-' + s;
  const sc = row.querySelector('.col-status');
  if (sc) sc.textContent = s;
  const rm = row.querySelector('.recheck-msg');
  if (rm) { rm.textContent = '→ ' + s; rm.style.color = s === 'ok' ? '#4caf50' : '#ef5350'; }

  const checks = result.checks || [];
  const knownCheck = checks.find(c => c.username_type === 'known');
  const randomCheck = checks.find(c => c.username_type === 'random');
  const eCodeCell = row.querySelector('.col-ecode-actual');
  const mCodeCell = row.querySelector('.col-mcode-actual');
  if (eCodeCell) setCodeCell(eCodeCell, result.e_code, knownCheck ? knownCheck.http_code : undefined);
  if (mCodeCell) setCodeCell(mCodeCell, result.m_code, randomCheck ? randomCheck.http_code : undefined);

  if (typeof WMN_CHECKS !== 'undefined') WMN_CHECKS[siteName] = checks;
  if (typeof $ !== 'undefined') $('#results-table').DataTable().row(row).invalidate().draw(false);
}

function setCodeCell(cell, expected, received) {
  const color = received === expected ? '#4caf50' : (received == null ? '#666' : '#ef5350');
  const rcvdStr = received != null ? received : '—';
  cell.innerHTML = '<span style="color:' + color + '">' + expected + ' / ' + rcvdStr + '</span>';
}

// ---- Recheck in edit modal ----
async function recheckInModal(siteName) {
  const modalId = 'modal-' + siteName.replace(/[^a-z0-9]/gi, '_');
  const modal = document.getElementById(modalId);
  const btn = modal ? modal.querySelector('.btn-recheck-modal') : null;
  const checksEl = modal ? modal.querySelector('.modal-checks') : null;
  if (btn) { btn.textContent = 'Checking…'; btn.disabled = true; }
  try {
    const resp = await fetch('/recheck/' + encodeURIComponent(siteName), { method: 'POST' });
    const data = await resp.json();
    if (data.success) {
      if (checksEl) checksEl.innerHTML = renderChecks(data.result.checks);
      updateRowAfterRecheck(siteName, data.result);
      if (btn) btn.textContent = 'Recheck';
    } else {
      if (btn) btn.textContent = 'Recheck';
      alert('Recheck error: ' + data.error);
    }
  } catch (e) {
    if (btn) btn.textContent = 'Recheck';
    alert('Network error: ' + e.message);
  }
  if (btn) btn.disabled = false;
}

// ---- Recheck (table row) ----
async function recheckSite(siteName) {
  const row = document.querySelector('tr[data-name="' + CSS.escape(siteName) + '"]');
  const btn = row ? row.querySelector('.btn-recheck') : null;
  const msgEl = row ? row.querySelector('.recheck-msg') : null;
  if (btn) { btn.innerHTML = ICON_SPIN; btn.disabled = true; }
  if (msgEl) msgEl.textContent = '';
  try {
    const resp = await fetch('/recheck/' + encodeURIComponent(siteName), { method: 'POST' });
    const data = await resp.json();
    if (data.success) {
      updateRowAfterRecheck(siteName, data.result);
    } else {
      if (msgEl) { msgEl.textContent = 'Error: ' + data.error; msgEl.style.color = '#ef5350'; }
      else alert('Recheck error: ' + data.error);
    }
  } catch (e) {
    if (msgEl) { msgEl.textContent = 'Network error'; msgEl.style.color = '#ef5350'; }
    else alert('Recheck error: ' + e.message);
  }
  if (btn) { btn.innerHTML = ICON_RECHECK; btn.disabled = false; }
}

// ---- Delete site ----
async function deleteSite(siteName) {
  if (!confirm('Permanently delete "' + siteName + '" from wmn-data.json?')) return;
  try {
    const resp = await fetch('/delete/' + encodeURIComponent(siteName), { method: 'POST' });
    const data = await resp.json();
    if (data.success) {
      const row = document.querySelector('tr[data-name="' + CSS.escape(siteName) + '"]');
      if (row) {
        if (typeof $ !== 'undefined') {
          $('#results-table').DataTable().row(row).remove().draw(false);
        } else {
          row.remove();
        }
      }
      const modal = document.getElementById('modal-' + siteName.replace(/[^a-z0-9]/gi, '_'));
      if (modal) modal.remove();
    } else {
      alert('Delete error: ' + data.error);
    }
  } catch (e) {
    alert('Network error: ' + e.message);
  }
}
</script>
</body>
</html>
