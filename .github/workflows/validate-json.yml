name: Validate JSON

on:
  pull_request:
    paths:
      - 'wmn-data.json'
      - 'wmn-data-schema.json'
  push:
    paths:
      - 'wmn-data.json'
      - 'wmn-data-schema.json'

permissions:
  contents: read

jobs:
  validate-json:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Naminter
        run: python -m pip install "naminter[core]==1.0.7"

      - name: Validate JSON
        run: |
          naminter validate \
            --local-schema wmn-data-schema.json \
            --local-data wmn-data.json
